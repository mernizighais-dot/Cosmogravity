<script>
    /*Affiche du texte dans la bonne langue (cf gestion_langues.js)*/
    texte_navigation()

    /*Ajout de la classe active pour une classe item quand on clique dessus, permettant d'afficher un sous menu
      (cf styleNav.css .item.active > .sousMenu)*/
    document.querySelectorAll('.item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();

            // fermer les éléments au même niveau
            const siblings = item.parentElement.querySelectorAll('.item');
            siblings.forEach(el => {
                if (el !== item) {
                    el.classList.remove('active');
                }
            });

            item.classList.toggle('active');
        });
    });

    // fermer tous les menus si on clique en dehors
    document.addEventListener('click', () => {
        document.querySelectorAll('.item').forEach(item => {
            item.classList.remove('active');
        });
    });

function updateUI() {
    const items = document.querySelectorAll(".item");
    const checkbox = document.querySelector('nav input[type="checkbox"]');

    items.forEach(item => {
        // Cas mobile
        if (window.innerWidth <= 1200) {
            if (checkbox && checkbox.checked) {
                item.classList.remove("cache"); // menu ouvert
            } else {
                item.classList.add("cache"); // menu fermé
            }
        } 
        // Cas desktop
        else {
            item.classList.remove("cache");
        }
    });
}

// événements
window.addEventListener("resize", updateUI);
window.addEventListener("load", updateUI);

document.addEventListener("change", (e) => {
    if (e.target.matches('nav input[type="checkbox"]')) {
        updateUI();
    }
});

</script>
